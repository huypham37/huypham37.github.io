<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReInvent the wheel — logo typeface specimen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --paper: #fff;
      --ink: #111;
      --soft: #55514a;
      --line: #d8d4ca;
      --line-strong: #8e897c;
      --blue: #003153;
      --mono: "IBM Plex Mono", ui-monospace, monospace;
      --sans: "IBM Plex Sans Condensed", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #fff;
      color: var(--ink);
      font-family: var(--mono);
      padding: 48px 20px 72px;
    }

    main {
      width: min(1040px, 100%);
      margin: 0 auto;
      background: var(--paper);
      box-shadow:
        0 1px 0 rgba(0, 0, 0, .05),
        0 18px 60px rgba(60, 50, 30, .10);
      padding: 42px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line-strong);
    }

    .label {
      color: var(--soft);
      font-size: 10px;
      letter-spacing: .14em;
      line-height: 1.6;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 0;
      font-family: var(--sans);
      font-size: clamp(36px, 8vw, 92px);
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: .9;
      text-transform: uppercase;
    }

    .brand-text {
      color: var(--blue);
      font-size: 12px;
      letter-spacing: .12em;
      line-height: 1.4;
      text-align: right;
      text-transform: uppercase;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-top: 18px;
    }

    .toggle {
      border: 1px solid var(--line-strong);
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      padding: 9px 12px;
      text-transform: uppercase;
    }

    .toggle::before {
      content: "";
      width: 9px;
      height: 9px;
      background: currentColor;
    }

    .toggle[aria-pressed="true"] {
      border-color: var(--blue);
      color: var(--blue);
    }

    .options {
      display: grid;
      gap: 18px;
      margin-top: 28px;
    }

    .option {
      display: grid;
      grid-template-columns: 148px 1fr;
      gap: 24px;
      border: 1px solid var(--line);
      padding: 22px;
      border-color: var(--blue);
      box-shadow: inset 0 0 0 1px var(--blue);
    }

    .option-title {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .option-note {
      color: var(--soft);
      font-size: 10px;
      letter-spacing: .08em;
      line-height: 1.6;
      text-transform: uppercase;
    }

    .mark {
      color: var(--mark-color, #000);
      font-size: clamp(48px, 9vw, 110px);
      letter-spacing: -.075em;
      line-height: .74;
      text-transform: uppercase;
    }

    .mark span {
      display: block;
      white-space: nowrap;
    }

    .archivo { font-family: "Archivo Black", Impact, sans-serif; }

    @media (max-width: 760px) {
      body { padding: 16px; }
      main { padding: 28px; }
      header { grid-template-columns: 1fr; }
      .brand-text { text-align: left; }
      .toolbar { justify-content: flex-start; }
      .option { grid-template-columns: 1fr; }
      .mark {
        font-size: clamp(34px, 12vw, 72px);
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <div class="label">Logo typeface specimen / selected direction</div>
        <h1>ReInvent the wheel</h1>
      </div>
      <div class="brand-text">ReInvent<br>thewheel</div>
    </header>

    <div class="toolbar">
      <button class="toggle" type="button" aria-pressed="false" data-color-toggle>
        Color / Black
      </button>
    </div>

    <section class="options" aria-label="Logo option">
      <article class="option">
        <span>
          <span class="option-title">Option 01 / Archivo Black</span>
          <span class="option-note">Heavy, blocky, closest free starting point.</span>
        </span>
        <span class="mark archivo">
          <span>REINVENT</span>
          <span>THE WHEEL</span>
        </span>
      </article>
    </section>
  </main>

  <script>
    const toggle = document.querySelector('[data-color-toggle]');
    const mark = document.querySelector('.mark');

    toggle.addEventListener('click', () => {
      const blue = toggle.getAttribute('aria-pressed') !== 'true';
      toggle.setAttribute('aria-pressed', String(blue));
      toggle.textContent = blue ? 'Color / Prussian Blue' : 'Color / Black';
      mark.style.setProperty('--mark-color', blue ? '#003153' : '#000');
    });
  </script>
</body>
</html>
