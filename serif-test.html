<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Single-storey serif a specimen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bellefair&family=Cormorant:wght@300;400&family=Cormorant+Garamond:wght@300;400&family=Cormorant+Infant:wght@300;400&family=Cormorant+Upright:wght@300;400&family=Fanwood+Text&family=Forum&family=Goudy+Bookletter+1911&family=IM+Fell+English&family=Marcellus&family=Prata&family=Rosarivo&family=Sorts+Mill+Goudy&family=Spectral:wght@300;400&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: "Arizona Test";
    src: url("https://www.makingsoftware.com/_next/static/media/d67da450e4b24daa-s.p.woff2") format("woff2");
    font-display: swap;
    font-style: normal;
    font-weight: 400;
  }

  @font-face {
    font-family: "Arizona Test";
    src: url("https://www.makingsoftware.com/_next/static/media/0ad8e1830bc58fbc-s.p.woff2") format("woff2");
    font-display: swap;
    font-style: italic;
    font-weight: 400;
  }

  :root {
    --blue: #003153;
    --ink: #111;
    --soft: #55514a;
    --hair: #d8d4ca;
    --paper: #fff;
    --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: #fff;
    color: var(--ink);
    padding: 34px 20px 72px;
    font: 13px/1.5 var(--mono);
  }

  main {
    width: min(1120px, 100%);
    margin: 0 auto;
    background: var(--paper);
    box-shadow: 0 1px 0 rgba(0, 0, 0, .05), 0 18px 60px rgba(60, 50, 30, .10);
    padding: clamp(24px, 5vw, 46px);
  }

  header {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: end;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 20px;
  }

  h1 {
    margin: 10px 0 0;
    font: 700 clamp(24px, 5vw, 48px)/.95 Helvetica, Arial, sans-serif;
    letter-spacing: -.035em;
  }

  .label,
  .count,
  .tag,
  .stack,
  .pick {
    font-family: var(--mono);
    letter-spacing: .12em;
    text-transform: uppercase;
  }

  .label,
  .count,
  .stack { color: var(--soft); }
  .label,
  .count { font-size: 10px; }
  .count { color: var(--blue); text-align: right; }

  .lead {
    max-width: 72ch;
    margin: 18px 0 24px;
    color: var(--soft);
  }

  .rows {
    display: grid;
    gap: 12px;
  }

  .choice {
    display: block;
    cursor: pointer;
  }

  .choice input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .row {
    border: 1px solid var(--hair);
    display: grid;
    grid-template-columns: 168px 154px 1fr;
    gap: 24px;
    min-height: 184px;
    padding: 20px;
    position: relative;
  }

  .choice:has(input:checked) .row {
    border-color: var(--blue);
    box-shadow: inset 0 0 0 1px var(--blue);
  }

  .pick {
    color: var(--blue);
    display: none;
    font-size: 10px;
    line-height: 1;
    position: absolute;
    right: 14px;
    top: 12px;
  }

  .choice:has(input:checked) .pick { display: block; }

  .tag {
    color: var(--blue);
    font-size: 11px;
    line-height: 1.35;
  }

  .stack {
    font-size: 10px;
    letter-spacing: 0;
    line-height: 1.6;
    margin-top: 10px;
    text-transform: none;
  }

  .a-mark {
    align-self: center;
    color: #333;
    font-size: 128px;
    font-weight: var(--title-weight, 400);
    letter-spacing: -.04em;
    line-height: .8;
    text-align: center;
    -webkit-text-stroke: var(--thin-stroke, 0) #fff;
  }

  .sample { text-align: center; }

  .title {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: var(--title-weight, 400);
    letter-spacing: -.02em;
    line-height: 1.04;
    -webkit-text-stroke: var(--thin-stroke, 0) #fff;
  }

  .subtitle {
    color: #273149;
    font-size: 22px;
    line-height: 1.45;
    margin: 18px auto 0;
    max-width: 64ch;
  }

  .glyphs {
    font-size: 21px;
    letter-spacing: .02em;
    margin-top: 14px;
  }

  .italic { font-style: italic; }

  @media (max-width: 820px) {
    header,
    .row { grid-template-columns: 1fr; }
    .count { text-align: left; }
    .a-mark { text-align: left; }
  }
</style>
</head>
